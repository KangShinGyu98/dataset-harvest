targets:
  - source: ourworldindata
    kind: owid_explorers
    url: https://ourworldindata.org/explorers

  - source: ourworldindata
    kind: owid_topics
    url: https://ourworldindata.org/#all-topics

  - source: fivethirtyeight
    kind: csv_index
    url: https://raw.githubusercontent.com/fivethirtyeight/data/master/index.csv

  - source: kaggle
    kind: kaggle_datasets
    url: https://www.kaggle.com/datasets?sort=votes
    pages: 100
    sort_by: votes

  - source: uci
    kind: uci_datasets
    url: https://archive.ics.uci.edu/datasets?skip=25&take=25&sort=desc&orderBy=NumHits&search=
    pages: 1

  - source: openml
    kind: openml_datasets
    url: https://www.openml.org/search?type=data&sort=runs&status=active
    page_size: 100
    pages: 1
    status: active

  - source: aws_open_data
    kind: aws_registry
    url: https://registry.opendata.aws/
    include_deprecated: false

  - source: worldbank
    kind: worldbank_data360
    url: https://data360.worldbank.org/en/search
    page_size: 100
    pages: 1
